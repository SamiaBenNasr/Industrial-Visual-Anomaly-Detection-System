name: Build and Deploy PatchCore to Azure ML

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'score.py'
      - 'deployment.yml'
      - 'environment.yml'
      - 'endpoint_score.py'
      - 'server.py'
      - 'tests/**'
      - '.github/workflows/tests.yml'
      - '.github/workflows/build-image.yml'
      - '.github/workflows/deploy-endpoint.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build:
    needs: test
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-endpoint.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit