# ─────────────────────────────────────────────────────────────────────────────
# Suite du workflow : Register → Docker → Deploy
# À coller à la fin de anomaly_detection.yml (après le job "score")
# ─────────────────────────────────────────────────────────────────────────────

  # ─── 4. Docker build & push ───────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: train
    if: needs.train.result == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download checkpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: model-checkpoint
          path: aml_outputs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/patchcore-inference
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 5. Register model in Azure ML Registry ───────────────────────────────
  register:
    name: Register Model
    runs-on: ubuntu-latest
    needs: [train, docker]
    if: needs.train.result == 'success'
    outputs:
      model_name:    ${{ steps.reg.outputs.model_name }}
      model_version: ${{ steps.reg.outputs.model_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Azure ML SDK v2
        run: pip install azure-ai-ml azure-identity

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download checkpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: model-checkpoint
          path: aml_outputs/

      - name: Download metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: aml_outputs/
        continue-on-error: true

      - name: Register model
        id: reg
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AML_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP:  ${{ secrets.AML_RESOURCE_GROUP }}
          AML_WORKSPACE:       ${{ secrets.AML_WORKSPACE }}
        run: |
          python register_model.py \
            --ckpt          aml_outputs/weights/lightning/model.ckpt \
            --name          patchcore-anomaly-detector \
            --category      ${{ env.CATEGORY }} \
            --metrics-file  aml_outputs/metrics.json

  # ─── 6. Deploy managed online endpoint ───────────────────────────────────
  deploy:
    name: Deploy Endpoint
    runs-on: ubuntu-latest
    needs: [register, docker]
    if: |
      needs.register.result == 'success' &&
      needs.docker.result   == 'success' &&
      github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Azure ML SDK v2
        run: pip install azure-ai-ml azure-identity

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to managed online endpoint
        id: deploy
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AML_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP:  ${{ secrets.AML_RESOURCE_GROUP }}
          AML_WORKSPACE:       ${{ secrets.AML_WORKSPACE }}
        run: |
          python deploy_endpoint.py \
            --model-name     ${{ needs.register.outputs.model_name }} \
            --model-version  ${{ needs.register.outputs.model_version }} \
            --endpoint-name  patchcore-endpoint \
            --deployment-name blue \
            --instance-type  Standard_DS3_v2 \
            --instance-count 1 \
            --traffic        100

      - name: Smoke test endpoint
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AML_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP:  ${{ secrets.AML_RESOURCE_GROUP }}
          AML_WORKSPACE:       ${{ secrets.AML_WORKSPACE }}
        run: |
          python - <<'PYEOF'
          import base64, json, os, sys
          from azure.ai.ml import MLClient
          from azure.identity import DefaultAzureCredential
          from PIL import Image
          import io

          ml = MLClient(
              DefaultAzureCredential(),
              os.environ["AML_SUBSCRIPTION_ID"],
              os.environ["AML_RESOURCE_GROUP"],
              os.environ["AML_WORKSPACE"],
          )

          # Image noire 256x256 comme probe minimale
          img = Image.new("RGB", (256, 256), color=(0, 0, 0))
          buf = io.BytesIO()
          img.save(buf, format="PNG")
          b64 = base64.b64encode(buf.getvalue()).decode()

          payload = json.dumps({"image_b64": b64})
          response = ml.online_endpoints.invoke(
              endpoint_name="patchcore-endpoint",
              deployment_name="blue",
              request_file=None,
              input_data=payload,
          )
          result = json.loads(response)
          print("Smoke test result:", result)
          assert "pred_score" in result, "Missing pred_score in response"
          print("✅ Smoke test passed")
          PYEOF
