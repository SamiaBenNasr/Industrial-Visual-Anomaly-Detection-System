name: Deploy Endpoint

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag de l''image ACR a deployer (ex: latest ou un SHA)'
        default: 'latest'

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: patchcore-inference
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  WORKSPACE_NAME: ${{ secrets.WORKSPACE_NAME }}
  ENDPOINT_NAME: patchcore-endpoint
  DEPLOYMENT_NAME: patchcore-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: azure-ml
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install azure-ml CLI extension
        run: az extension add -n ml -y

      - name: Update environment with new image tag
        run: |
          cat <<EOF > environment.generated.yml
          \$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json
          name: patchcore-env
          image: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          inference_config:
            liveness_route:
              path: /health
              port: 8080
            readiness_route:
              path: /health
              port: 8080
            scoring_route:
              path: /score
              port: 8080
          EOF
          az ml environment create --file environment.generated.yml \
            --workspace-name ${{ env.WORKSPACE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      # ---------- Créer le deployment s'il n'existe pas, sinon le mettre à jour ----------
      - name: Create or update deployment
        run: |
          if ! az ml online-deployment show --name ${{ env.DEPLOYMENT_NAME }} \
              --endpoint-name ${{ env.ENDPOINT_NAME }} \
              --workspace-name ${{ env.WORKSPACE_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Deployment inexistant -> creation avec tout le trafic"
            az ml online-deployment create --file deployment.yml \
              --workspace-name ${{ env.WORKSPACE_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --all-traffic
          else
            echo "Deployment existant -> mise a jour"
            az ml online-deployment update --file deployment.yml \
              --workspace-name ${{ env.WORKSPACE_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }}
          fi

      # ---------- Vérifier / forcer le trafic à 100% ----------
      - name: Ensure traffic is 100% on this deployment
        run: |
          az ml online-endpoint update --name ${{ env.ENDPOINT_NAME }} \
            --workspace-name ${{ env.WORKSPACE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --traffic "${{ env.DEPLOYMENT_NAME }}=100"

      - name: Confirm traffic
        run: |
          az ml online-endpoint show --name ${{ env.ENDPOINT_NAME }} \
            --workspace-name ${{ env.WORKSPACE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query traffic

      - name: Smoke test the endpoint
        run: |
          az ml online-endpoint invoke \
            --name ${{ env.ENDPOINT_NAME }} \
            --request-file test-request.json \
            --workspace-name ${{ env.WORKSPACE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}